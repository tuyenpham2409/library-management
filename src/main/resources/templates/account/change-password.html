<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đổi mật khẩu — Thư viện Phenikaa</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-wrapper">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="login-card card">
                <div class="card-header">
                    <div class="login-logo"><i class="bi bi-key"></i></div>
                    <h1 class="h4 text-white mb-1 fw-bold">Đổi mật khẩu</h1>
                    <p class="text-white-50 mb-0 small">Đổi mật khẩu mặc định sang mật khẩu của riêng bạn</p>
                </div>
                <div class="card-body p-4">
                    <div class="alert alert-success py-2" th:if="${success}">
                        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
                    </div>
                    <div class="alert alert-danger py-2" th:if="${error}">
                        <i class="bi bi-x-circle-fill me-2"></i><span th:text="${error}"></span>
                    </div>

                    <form th:action="@{/account/password}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="mb-3">
                            <label class="form-label fw-semibold text-secondary small">Mật khẩu hiện tại</label>
                            <input type="password" name="currentPassword" class="form-control" required
                                   placeholder="Nhập mật khẩu hiện tại..." autocomplete="current-password">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold text-secondary small">Mật khẩu mới</label>
                            <input type="password" name="newPassword" class="form-control" required minlength="6"
                                   placeholder="Tối thiểu 6 ký tự..." autocomplete="new-password">
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold text-secondary small">Xác nhận mật khẩu mới</label>
                            <input type="password" name="confirmPassword" class="form-control" required minlength="6"
                                   placeholder="Nhập lại mật khẩu mới..." autocomplete="new-password">
                        </div>
                        <button type="submit" class="btn btn-login">
                            <i class="bi bi-check-lg me-2"></i>Đổi mật khẩu
                        </button>
                    </form>

                    <div class="text-center mt-3">
                        <a th:href="@{/}" class="text-decoration-none small">
                            <i class="bi bi-arrow-left me-1"></i>Quay lại trang chính
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
