<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quản lý người dùng — Admin</title>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="phenikaa-body">
<nav class="navbar navbar-expand-lg phenikaa-navbar sticky-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/admin/dashboard}">
            <div class="brand-icon"><i class="bi bi-shield-check"></i></div>
            <div><span class="brand-name">Phenikaa Admin</span><small class="d-block brand-sub">Quản trị thư viện</small></div>
        </a>
        <div class="d-flex gap-2">
            <a th:href="@{/admin/dashboard}" class="btn btn-outline-light btn-sm"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a>
            <a th:href="@{/admin/books}" class="btn btn-outline-light btn-sm"><i class="bi bi-books me-1"></i>Sách</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right"></i></button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-3" th:if="${success != null}">
    <div class="alert alert-success alert-dismissible fade show" th:if="${success}">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<main class="container py-4">
    <div class="section-header mb-4">
        <div class="section-header-icon"><i class="bi bi-people-fill"></i></div>
        <div>
            <h1 class="section-title">Quản lý người dùng</h1>
            <p class="section-subtitle" th:text="${users.size()} + ' tài khoản trong hệ thống'"></p>
        </div>
    </div>

    <div class="card table-card">
        <table class="table table-hover mb-0">
            <thead>
                <tr>
                    <th>Mã số</th>
                    <th>Họ tên</th>
                    <th>Vai trò</th>
                    <th>Trạng thái thẻ</th>
                    <th>Ngày tạo</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="user : ${users}"
                    th:classappend="${user.cardStatus.name() == 'LOCKED'} ? 'table-secondary' : ''">
                    <td><code th:text="${user.studentCode}"></code></td>
                    <td class="fw-semibold" th:text="${user.fullName}"></td>
                    <td>
                        <span class="badge" th:switch="${user.role.name()}">
                            <span th:case="'STUDENT'" class="badge bg-info text-dark">Sinh viên</span>
                            <span th:case="'LECTURER'" class="badge bg-primary">Giảng viên</span>
                            <span th:case="'RESEARCHER'" class="badge bg-purple" style="background:#7c3aed">Nghiên cứu viên</span>
                            <span th:case="'ADMIN'" class="badge bg-dark">Admin</span>
                        </span>
                    </td>
                    <td>
                        <span class="badge bg-success" th:if="${user.cardStatus.name() == 'ACTIVE'}">
                            <i class="bi bi-check-circle me-1"></i>Đang hoạt động
                        </span>
                        <span class="badge bg-danger" th:if="${user.cardStatus.name() == 'LOCKED'}">
                            <i class="bi bi-lock-fill me-1"></i>Đang khoá
                        </span>
                    </td>
                    <td class="small text-muted"
                        th:text="${user.createdAt != null ? #temporals.format(user.createdAt, 'dd/MM/yyyy') : '--'}">
                    </td>
                    <td>
                        <form th:if="${user.role.name() != 'ADMIN'}"
                              th:action="@{/admin/users/{id}/toggle-status(id=${user.id})}"
                              method="post" class="d-inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="btn btn-sm"
                                    th:classappend="${user.cardStatus.name() == 'ACTIVE'} ? 'btn-outline-danger' : 'btn-outline-success'"
                                    th:text="${user.cardStatus.name() == 'ACTIVE'} ? '🔒 Khoá tài khoản' : '🔓 Mở khoá'"
                                    onclick="return confirm('Xác nhận thay đổi trạng thái tài khoản này?')">
                            </button>
                        </form>
                        <span class="text-muted small" th:if="${user.role.name() == 'ADMIN'}">—</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<footer class="phenikaa-footer mt-5">
    <div class="container text-center py-3">
        <p class="mb-0 small">© 2025 Thư viện Đại học Phenikaa — Admin Panel</p>
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
