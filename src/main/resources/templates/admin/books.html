<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quản lý sách — Thủ thư</title>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="phenikaa-body">
<nav class="navbar navbar-expand-lg phenikaa-navbar sticky-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/admin/dashboard}">
            <div class="brand-icon"><i class="bi bi-shield-check"></i></div>
            <div><span class="brand-name">Phenikaa Admin</span><small class="d-block brand-sub">Quản trị thư viện</small></div>
        </a>
        <div class="d-flex align-items-center gap-2">
            <a th:href="@{/admin/dashboard}" class="btn btn-outline-light btn-sm"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a>
            <a th:href="@{/admin/loans/pending}" class="btn btn-outline-light btn-sm"><i class="bi bi-box-seam me-1"></i>Đơn chờ lấy</a>
            <a th:href="@{/admin/loans/active}" class="btn btn-outline-light btn-sm"><i class="bi bi-arrow-return-left me-1"></i>Đang mượn</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right"></i></button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-3" th:if="${success != null or error != null}">
    <div class="alert alert-success alert-dismissible fade show" th:if="${success}">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="alert alert-danger alert-dismissible fade show" th:if="${error}">
        <i class="bi bi-x-circle-fill me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<main class="container py-4">
    <div class="d-flex align-items-center justify-content-between mb-4">
        <div class="section-header mb-0">
            <div class="section-header-icon"><i class="bi bi-books"></i></div>
            <div>
                <h1 class="section-title">Quản lý sách</h1>
                <p class="section-subtitle" th:text="${books.size()} + ' tài liệu trong hệ thống'"></p>
            </div>
        </div>
        <a th:href="@{/admin/books/new}" class="btn btn-phenikaa">
            <i class="bi bi-plus-lg me-2"></i>Thêm sách mới
        </a>
    </div>

    <div class="card table-card">
        <table class="table table-hover mb-0">
            <thead>
                <tr>
                    <th>Tên sách</th>
                    <th>Tác giả</th>
                    <th>Loại TL</th>
                    <th>Mã phân loại</th>
                    <th class="text-center">Tổng</th>
                    <th class="text-center">Còn</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="book : ${books}">
                    <td>
                        <div class="fw-semibold" th:text="${book.title}"></div>
                        <small class="text-muted" th:text="${book.isbn}" th:if="${book.isbn != null}"></small>
                    </td>
                    <td class="small" th:text="${book.author}"></td>
                    <td>
                        <span th:switch="${book.docType.name()}">
                            <span th:case="'TEXTBOOK'" class="doc-type-badge badge-textbook">Giáo trình</span>
                            <span th:case="'SPECIALIZED_REF'" class="doc-type-badge badge-specialized">TK CN</span>
                            <span th:case="'GENERAL_REF'" class="doc-type-badge badge-general">TK TC</span>
                            <span th:case="'RESTRICTED'" class="doc-type-badge badge-restricted">Nội sinh</span>
                        </span>
                    </td>
                    <td><code class="small" th:text="${book.classificationCode}"></code></td>
                    <td class="text-center" th:text="${book.totalCopies}"></td>
                    <td class="text-center">
                        <span class="fw-bold text-success" th:text="${book.availableCopies}" th:if="${book.availableCopies > 0}"></span>
                        <span class="fw-bold text-danger" th:text="0" th:if="${book.availableCopies == 0}"></span>
                    </td>
                    <td>
                        <div class="d-flex gap-1">
                            <a th:href="@{/admin/books/{id}/edit(id=${book.id})}"
                               class="btn btn-outline-primary btn-sm">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <form th:action="@{/admin/books/{id}/delete(id=${book.id})}" method="post" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" class="btn btn-outline-danger btn-sm"
                                        onclick="return confirm('Xóa sách này?')">
                                    <i class="bi bi-trash3"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<footer class="phenikaa-footer mt-5">
    <div class="container text-center py-3">
        <p class="mb-0 small">© 2025 Thư viện Đại học Phenikaa — Admin Panel</p>
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
