<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sách đang mượn — Admin</title>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="phenikaa-body">
<nav class="navbar navbar-expand-lg phenikaa-navbar sticky-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/admin/dashboard}">
            <div class="brand-icon"><i class="bi bi-shield-check"></i></div>
            <div><span class="brand-name">Phenikaa Admin</span><small class="d-block brand-sub">Quản trị thư viện</small></div>
        </a>
        <div class="d-flex align-items-center gap-2">
            <a th:href="@{/admin/dashboard}" class="btn btn-outline-light btn-sm"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a>
            <a th:href="@{/admin/loans/pending}" class="btn btn-outline-light btn-sm"><i class="bi bi-box-seam me-1"></i>Đơn chờ lấy</a>
            <a th:href="@{/admin/books}" class="btn btn-outline-light btn-sm"><i class="bi bi-books me-1"></i>Sách</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right"></i></button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-3" th:if="${success != null or error != null or warn != null}">
    <div class="alert alert-success alert-dismissible fade show" th:if="${success}">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="alert alert-warning alert-dismissible fade show" th:if="${warn}">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${warn}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="alert alert-danger alert-dismissible fade show" th:if="${error}">
        <i class="bi bi-x-circle-fill me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<main class="container py-4">
    <div class="section-header mb-4">
        <div class="section-header-icon"><i class="bi bi-arrow-return-left"></i></div>
        <div>
            <h1 class="section-title">Sách đang mượn</h1>
            <p class="section-subtitle" th:text="${details.size()} + ' cuốn đang lưu thông'"></p>
        </div>
    </div>

    <div class="empty-state" th:if="${details.isEmpty()}">
        <div class="empty-state-icon">📚</div>
        <h3 class="h5 text-muted">Không có sách nào đang được mượn</h3>
    </div>

    <div class="card table-card" th:if="${!details.isEmpty()}">
        <table class="table table-hover mb-0">
            <thead>
                <tr>
                    <th>Người mượn</th>
                    <th>Tên sách</th>
                    <th>Loại TL</th>
                    <th>Hạn trả</th>
                    <th>Tình trạng</th>
                    <th>Số lần GH</th>
                    <th>Xác nhận trả</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="detail : ${details}"
                    th:classappend="${detail.overdue} ? 'table-danger' : (${detail.dueSoon} ? 'table-warning' : '')">
                    <td>
                        <div class="fw-semibold small" th:text="${detail.loan.user.fullName}"></div>
                        <small class="text-muted" th:text="${detail.loan.user.studentCode}"></small>
                    </td>
                    <td>
                        <div class="fw-semibold" th:text="${detail.book.title}"></div>
                        <small class="text-muted" th:text="${detail.book.author}"></small>
                    </td>
                    <td>
                        <span th:switch="${detail.book.docType.name()}">
                            <span th:case="'TEXTBOOK'" class="doc-type-badge badge-textbook">GT</span>
                            <span th:case="'SPECIALIZED_REF'" class="doc-type-badge badge-specialized">TKCC</span>
                            <span th:case="'GENERAL_REF'" class="doc-type-badge badge-general">TKTC</span>
                        </span>
                    </td>
                    <td>
                        <span th:if="${detail.dueDate != null}"
                              th:text="${#temporals.format(detail.dueDate, 'dd/MM/yyyy')}"
                              th:classappend="${detail.overdue} ? 'text-danger fw-bold' : ''"></span>
                        <span th:if="${detail.dueDate == null}" class="text-success small">Không giới hạn</span>
                    </td>
                    <td>
                        <span class="overdue-badge" th:if="${detail.overdue}">
                            Quá <span th:text="${detail.daysOverdue}"></span> ngày
                        </span>
                        <span class="due-soon-badge" th:if="${detail.dueSoon and !detail.overdue}">
                            Còn <span th:text="${detail.daysRemaining}"></span> ngày
                        </span>
                        <span class="badge bg-success" th:if="${!detail.overdue and !detail.dueSoon}">Đúng hạn</span>
                    </td>
                    <td class="text-center" th:text="${detail.renewalCount}"></td>
                    <td>
                        <form th:action="@{/admin/loans/details/{id}/return(id=${detail.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <div class="d-flex gap-1 align-items-center">
                                <select name="condition" class="form-select form-select-sm" style="width:100px">
                                    <option value="GOOD">Tốt</option>
                                    <option value="DAMAGED">Hỏng</option>
                                </select>
                                <button type="submit" class="btn btn-sm btn-success"
                                        onclick="return confirm('Xác nhận trả sách này?')">
                                    <i class="bi bi-check-circle me-1"></i>Trả
                                </button>
                            </div>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<footer class="phenikaa-footer mt-5">
    <div class="container text-center py-3">
        <p class="mb-0 small">© 2025 Thư viện Đại học Phenikaa — Admin Panel</p>
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
