<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đơn chờ lấy — Thủ thư</title>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="phenikaa-body">
<nav class="navbar navbar-expand-lg phenikaa-navbar sticky-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/admin/dashboard}">
            <div class="brand-icon"><i class="bi bi-shield-check"></i></div>
            <div><span class="brand-name">Phenikaa Admin</span><small class="d-block brand-sub">Quản trị thư viện</small></div>
        </a>
        <div class="d-flex align-items-center gap-2">
            <a th:href="@{/admin/dashboard}" class="btn btn-outline-light btn-sm"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a>
            <a th:href="@{/admin/loans/active}" class="btn btn-outline-light btn-sm"><i class="bi bi-arrow-return-left me-1"></i>Đang mượn</a>
            <a th:href="@{/admin/books}" class="btn btn-outline-light btn-sm"><i class="bi bi-books me-1"></i>Sách</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right"></i></button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-3" th:if="${success != null or error != null}">
    <div class="alert alert-success alert-dismissible fade show" th:if="${success}">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="alert alert-danger alert-dismissible fade show" th:if="${error}">
        <i class="bi bi-x-circle-fill me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<main class="container py-4">
    <div class="section-header mb-4">
        <div class="section-header-icon"><i class="bi bi-box-seam"></i></div>
        <div>
            <h1 class="section-title">Đơn chờ lấy</h1>
            <p class="section-subtitle" th:text="${loans.size()} + ' đơn cần chuẩn bị sách (bạn đọc tự xác nhận nhận sách bằng mã mượn)'"></p>
        </div>
    </div>

    <div class="empty-state" th:if="${loans.isEmpty()}">
        <div class="empty-state-icon">✅</div>
        <h3 class="h5 text-muted">Không có đơn nào chờ lấy</h3>
    </div>

    <div class="accordion" id="pendingAccordion" th:if="${!loans.isEmpty()}">
        <div class="card mb-3" th:each="loan : ${loans}">
            <div class="card-header d-flex align-items-center justify-content-between py-3">
                <div class="d-flex align-items-center gap-3">
                    <span class="badge bg-dark fs-6 px-3">
                        <i class="bi bi-upc-scan me-1"></i>Mã mượn: <span th:text="${loan.pickupCode}"></span>
                    </span>
                    <div>
                        <div class="fw-bold" th:text="${loan.user.fullName}"></div>
                        <small class="text-muted">
                            <span th:text="${loan.user.studentCode}"></span> •
                            <span th:switch="${loan.user.role.name()}">
                                <span th:case="'STUDENT'">Sinh viên</span>
                                <span th:case="'LECTURER'">Giảng viên</span>
                                <span th:case="'RESEARCHER'">Nghiên cứu viên</span>
                            </span> •
                            Tạo lúc: <span th:text="${#temporals.format(loan.createdAt, 'dd/MM/yyyy HH:mm')}"></span> •
                            Hạn lấy: <span class="text-danger fw-semibold"
                                           th:text="${#temporals.format(loan.pickupDeadline, 'dd/MM/yyyy HH:mm')}"></span>
                        </small>
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-outline-secondary btn-sm" type="button"
                            data-bs-toggle="collapse" th:data-bs-target="'#detail' + ${loan.id}">
                        <i class="bi bi-eye me-1"></i>Xem chi tiết
                    </button>
                    <form th:action="@{/admin/loans/{id}/cancel(id=${loan.id})}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-outline-danger btn-sm"
                                onclick="return confirm('Huỷ đơn mượn này?')">
                            <i class="bi bi-x-lg me-1"></i>Huỷ
                        </button>
                    </form>
                </div>
            </div>
            <div th:id="'detail' + ${loan.id}" class="collapse">
                <div class="card-body p-0">
                    <table class="table table-sm table-hover mb-0">
                        <thead>
                            <tr class="table-light">
                                <th class="ps-3">Tên sách</th>
                                <th>Tác giả</th>
                                <th>Loại TL</th>
                                <th>Mã phân loại</th>
                                <th>Còn sẵn</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="detail : ${loan.loanDetails}">
                                <td class="ps-3 fw-semibold" th:text="${detail.book.title}"></td>
                                <td class="text-muted small" th:text="${detail.book.author}"></td>
                                <td>
                                    <span th:switch="${detail.book.docType.name()}">
                                        <span th:case="'TEXTBOOK'" class="doc-type-badge badge-textbook">GT</span>
                                        <span th:case="'SPECIALIZED_REF'" class="doc-type-badge badge-specialized">TKCC</span>
                                        <span th:case="'GENERAL_REF'" class="doc-type-badge badge-general">TKTC</span>
                                    </span>
                                </td>
                                <td><code class="small" th:text="${detail.book.classificationCode}"></code></td>
                                <td>
                                    <span th:text="${detail.book.availableCopies}"></span>
                                    <span class="badge bg-success ms-1" th:if="${detail.book.availableCopies > 0}">✓</span>
                                    <span class="badge bg-danger ms-1" th:if="${detail.book.availableCopies == 0}">Hết</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="phenikaa-footer mt-5">
    <div class="container text-center py-3">
        <p class="mb-0 small">© 2025 Thư viện Đại học Phenikaa — Admin Panel</p>
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
