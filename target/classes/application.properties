# ==========================================
# APPLICATION CONFIGURATION — Library Management
# ==========================================
spring.application.name=library-management
server.port=8080

# ==========================================
# H2 IN-MEMORY DATABASE (Development)
# ==========================================
spring.datasource.url=jdbc:h2:mem:librarydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# ==========================================
# SQL INITIALIZATION
# ==========================================
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

# ==========================================
# THYMELEAF
# ==========================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ==========================================
# SESSION
# ==========================================
server.servlet.session.timeout=60m
spring.session.store-type=none

# ==========================================
# LOGGING
# ==========================================
logging.level.com.library=INFO
logging.level.org.springframework.security=WARN
