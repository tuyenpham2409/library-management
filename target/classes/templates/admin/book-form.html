<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${isNew} ? 'Thêm sách mới' : 'Sửa thông tin sách'">Quản lý sách</title>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="phenikaa-body">
<nav class="navbar navbar-expand-lg phenikaa-navbar sticky-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/admin/dashboard}">
            <div class="brand-icon"><i class="bi bi-shield-check"></i></div>
            <div><span class="brand-name">Phenikaa Admin</span></div>
        </a>
        <div class="d-flex gap-2">
            <a th:href="@{/admin/books}" class="btn btn-outline-light btn-sm"><i class="bi bi-arrow-left me-1"></i>Danh sách sách</a>
        </div>
    </div>
</nav>

<main class="container py-4" style="max-width:700px">
    <div class="section-header mb-4">
        <div class="section-header-icon">
            <i class="bi bi-plus-circle" th:if="${isNew}"></i>
            <i class="bi bi-pencil-square" th:if="${!isNew}"></i>
        </div>
        <div>
            <h1 class="section-title" th:text="${isNew} ? 'Thêm sách mới' : 'Sửa thông tin sách'"></h1>
        </div>
    </div>

    <div class="card p-4">
        <form th:action="${isNew} ? @{/admin/books} : @{/admin/books/{id}/update(id=${bookForm.id})}"
              method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="id" th:value="${bookForm.id}" th:if="${!isNew}">

            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label fw-semibold">Tên sách <span class="text-danger">*</span></label>
                    <input type="text" name="title" class="form-control" required
                           th:value="${bookForm.title}" placeholder="Nhập tên sách...">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Tác giả <span class="text-danger">*</span></label>
                    <input type="text" name="author" class="form-control" required
                           th:value="${bookForm.author}" placeholder="Nhập tên tác giả...">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">ISBN</label>
                    <input type="text" name="isbn" class="form-control"
                           th:value="${bookForm.isbn}" placeholder="978-...">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Loại tài liệu <span class="text-danger">*</span></label>
                    <select name="docType" class="form-select" required>
                        <option value="">-- Chọn loại --</option>
                        <option th:each="type : ${docTypes}" th:value="${type}" 
                                th:text="${type.name() == 'TEXTBOOK' ? 'Giáo trình' : 
                                          type.name() == 'SPECIALIZED_REF' ? 'Tham khảo chuyên ngành' : 
                                          type.name() == 'GENERAL_REF' ? 'Tham khảo tra cứu' : 'Tài liệu nội sinh'}"
                                th:selected="${bookForm.docType != null and bookForm.docType == type}">
                        </option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Danh mục</label>
                    <input type="text" name="category" class="form-control"
                           th:value="${bookForm.category}" placeholder="Toán học, CNTT...">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Mã phân loại</label>
                    <input type="text" name="classificationCode" class="form-control"
                           th:value="${bookForm.classificationCode}" placeholder="TOAN.001">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Nhà xuất bản</label>
                    <input type="text" name="publisher" class="form-control"
                           th:value="${bookForm.publisher}" placeholder="NXB Giáo Dục...">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Năm xuất bản</label>
                    <input type="number" name="publishYear" class="form-control"
                           th:value="${bookForm.publishYear}" min="1900" max="2030">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Tổng số cuốn</label>
                    <input type="number" name="totalCopies" class="form-control"
                           th:value="${bookForm.totalCopies != null ? bookForm.totalCopies : 1}" min="0">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Còn có sẵn</label>
                    <input type="number" name="availableCopies" class="form-control"
                           th:value="${bookForm.availableCopies != null ? bookForm.availableCopies : 1}" min="0">
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">URL ảnh bìa</label>
                    <input type="text" name="imageUrl" class="form-control"
                           th:value="${bookForm.imageUrl}" placeholder="https://...">
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">Mô tả</label>
                    <textarea name="description" class="form-control" rows="3"
                              th:text="${bookForm.description}" placeholder="Mô tả nội dung sách..."></textarea>
                </div>

                <div class="col-12 d-flex gap-3">
                    <button type="submit" class="btn btn-phenikaa px-4">
                        <i class="bi bi-check-lg me-2"></i>
                        <span th:text="${isNew} ? 'Thêm sách' : 'Lưu thay đổi'"></span>
                    </button>
                    <a th:href="@{/admin/books}" class="btn btn-outline-secondary">Huỷ</a>
                </div>
            </div>
        </form>
    </div>
</main>

<footer class="phenikaa-footer mt-5">
    <div class="container text-center py-3">
        <p class="mb-0 small">© 2025 Thư viện Đại học Phenikaa — Admin Panel</p>
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
